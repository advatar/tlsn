events {}

http {
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_protocols TLSv1.3;
        ssl_certificate /certs/rsa/end.fullchain;
        ssl_certificate_key /certs/rsa/end.key;

        location / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }
    }
}
